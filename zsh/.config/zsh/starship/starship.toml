[username]
format = '[$user](bold purple) '
disabled = false
show_always = true

[character]
success_symbol = '[´É▓](bold green) '
error_symbol = '[´É▓](bold red) '
vimcmd_symbol = '[¾░üı](bold green) '

[hostname]
ssh_only = false
format = 'at [$hostname](bold red) '
ssh_symbol = "¯¼ü "
disabled = false

[directory]
# truncate_to_repo = true # truncates directory to root folder if in github repo
read_only = " ´Çú "
truncation_symbol = 'ÔÇĞ/'
truncation_length = 3
format = 'in [¯ù¥ $path](bold blue) '
style = "bold italic blue"

[cmd_duration]
min_time = 500
show_milliseconds = false
disabled = false
style = "bold italic red"

[git_branch]
truncation_length = 4
truncation_symbol = ''

[battery]
full_symbol = '¾░éÅ '
charging_symbol = '¾░éä '
discharging_symbol = '¾░éâ '

[[battery.display]] # 'bold red' style and discharging_symbol when capacity is between 0% and 20%
threshold = 20
style = 'bold red'

[[battery.display]] # 'bold yellow' style when capacity is between 10% and 40%
threshold = 40
style = 'bold yellow'

[jobs]
symbol = '´Çô '
format = "[$symbol $number](bold blue)"
number_threshold = 1
symbol_threshold = 1

[os]
format = "on [($name) $symbol]($style)"
style = "bold blue"
disabled = true

