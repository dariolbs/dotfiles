add_newline = false

[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
ssh_symbol = "¯¼ü "
format = 'in [$hostname](bold purple) '
trim_at = "."
disabled = false

# Replace the "ÔØ»" symbol in the prompt with "Ô×£"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[¾░ºé](bold green)"     # The "success_symbol" segment is being set to "Ô×£" with the color "bold green"
error_symbol = "[¾░ºé](bold red)"
vicmd_symbol = "[¾░ºÇ](green)"

# configure directory
[directory]
read_only = " ´Çú "
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
format = 'in [¯ù¥ $path](bold blue) '
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"


[battery]
full_symbol = '¾░éÅ '
charging_symbol = '¾░éä '
discharging_symbol = '¾░éâ '

[[battery.display]] # 'bold red' style and discharging_symbol when capacity is between 0% and 20%
threshold = 20
style = 'bold red'

[[battery.display]] # 'bold yellow' style when capacity is between 10% and 40%
threshold = 40
style = 'bold yellow'

[docker_context]
symbol = "´îê "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[nodejs]
format = "via [¯ØÄ Node.js](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

