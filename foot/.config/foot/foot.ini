font=JetBrainsMonoNerdFont:size=17
[cursor]
# style=block
# color=<inverse foreground/background>
blink=yes

# -*- conf -*-
# Gruvbox
[colors]
background=1d2021
foreground=d5c4a1
regular0=3c3836
regular1=fb4934
regular2=b8bb26
regular3=fabd2f
regular4=83a598
regular5=d3869b
regular6=8ec07c
regular7=d5c4a1
